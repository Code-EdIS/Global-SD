<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global SD</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-grid"></div>

<nav id="navbar" class="fixed w-full top-0 left-0 flex justify-between p-6 text-sm z-50">
 <img src="./assets/Logo.png" alt="logo" class="tracking-wide w-[15%] lg:w-[5%]">

  <div class="flex gap-6 items-center">
    <span id="status" class="status-dot">ONLINE</span>
    <button onclick="setLang('it')">IT</button>
    <button onclick="setLang('en')">EN</button>
  </div>
</nav>

<!-- WRAPPER PER IL LOGO IN SOTTOFONDO-->

<div id="wrapperLogo" class="flex flex-col overflow-hidden">

  <img src="./assets/Logo.png" alt="logo" class="fixed z-[-50] opacity-20 blur-[1px]
            left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
            max-w-[70%] md:max-w-[40%]">

  <!-- HERO SECTION -->
  <section>
    <div class="text-center max-w-3xl">
      <h1 class="hero-title reveal mb-6" data-i18n="hero_title"></h1>
      <p class="hero-sub reveal mb-10" data-i18n="hero_sub"></p>
      <a href="contact.html" class="btn reveal" data-i18n="hero_cta"></a>
    </div>
  </section>

  <!-- OTHER SECTIONS -->

  <section>
    <div class="text-center">
      <h2 class="reveal mb-14" data-i18n="numbers_title"></h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-14">
        <div class="card reveal">
          <p class="text-5xl accent counter" data-target="250">0</p>
          <p class="mt-3 opacity-80" data-i18n="num1"></p>
        </div>

        <div class="card reveal">
          <p class="text-5xl accent counter" data-target="1200">0</p>
          <p class="mt-3 opacity-80" data-i18n="num2"></p>
        </div>

        <div class="card reveal">
          <p class="text-5xl accent counter" data-target="15">0</p>
          <p class="mt-3 opacity-80" data-i18n="num3"></p>
        </div>
      </div>
    </div>
  </section>

  <section>
    <div class="text-center max-w-4xl reveal">
      <h2 data-i18n="soft_title"></h2>
      <p data-i18n="soft_text"></p>
    </div>
  </section>

  <section class="relative dark-section overflow-hidden">
    <img src="./assets/privacy.png" alt="sfondoSicurezza" class="absolute inset-0 object-cover w-full h-full object-cover object-[70%_center]">
    <div class="text-center z-10 max-w-4xl reveal">
      <h2 data-i18n="sec_title"></h2>
      <p data-i18n="sec_text"></p>
    </div>
  </section>

  <section>
    <div class="text-center max-w-4xl reveal">
      <h2 data-i18n="comm_title"></h2>
      <p data-i18n="comm_text"></p>
    </div>
  </section>
  
  <section class="relative flex flex-col items-center justify-center">

  <div class="text-center max-w-4xl reveal relative z-10">
    
    <h2 data-i18n="maps_title"></h2>

    <p data-i18n="maps_text" class="whitespace-pre-line"></p>

    <div class="mt-10 flex justify-center w-full">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d11880.204049178768!2d12.51377!3d41.89176!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x132f619123351f29%3A0xcbc8f096de05145e!2sVia%20di%20Porta%20Maggiore%2C%2058%2F60%2C%2000185%20Roma%20RM!5e0!3m2!1sit!2sit!4v1777362784591!5m2!1sit!2sit"
        class="w-[90vw] max-w-4xl h-[450px] rounded-3xl border-0 hover:scale-[1.02] transition-transform duration-300"
        loading="lazy"
        allowfullscreen
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

  </div>

</section>

</div>

<!-- FOOTER -->

<footer class="w-full flex justify-between items-center p-6 text-md border-t border-black/10 mt-20">

  <img src="./assets/Logo.png" alt="logo" class="tracking-wide w-[15%] lg:w-[5%]">
  
  <span class="status-dot" data-i18n="p_iva"></span>
    
    <a href="contact.html" class="hover:opacity-70 transition border border-black/10 rounded-2xl p-1" data-i18n="contact_cta"></a>

</footer>

<script src="./script.js"></script>
</body>
</html>
