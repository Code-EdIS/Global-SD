<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Global SD</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg-grid"></div>

<nav class="fixed w-full top-0 left-0 flex justify-between p-6 text-sm z-50">
  <img src="./assets/Logo.png" alt="logo" class="tracking-wide w-[15%] lg:w-[5%]">

  <div class="flex gap-6 items-center">
    <button onclick="setLang('it')">IT</button>
    <button onclick="setLang('en')">EN</button>
    <a href="index.html">HOME</a>
  </div>
</nav>

<!-- WRAPPER PER IL LOGO IN SOTTOFONDO -->

<div id="wrapperLogo" class="flex flex-col overflow-hidden">

  <img src="./assets/Logo.png" alt="logo" class="fixed z-[-50] opacity-20 blur-[1px]
              left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2
              max-w-[70%] md:max-w-[40%]">

  <section>
    <div class="max-w-4xl w-full text-center reveal">

      <!-- GRID CONTATTI -->
      <div class="grid md:grid-cols-2 gap-10 text-left">

        <!-- GENERALE -->
  <div class="relative card p-6 border border-black/10 rounded-xl">
    
    
    <h2 class="mb-4 accent" data-i18n="contact_general"></h2>

    <p class="mb-6 opacity-80" data-i18n="contact_general_text"></p>

    <div class="flex flex-col gap-3">
      <a class="btn w-fit" href="mailto:info@global-sd.net">
        info@global-sd.net
      </a>

      <a 
        class="text-sm opacity-70 hover:opacity-100 transition w-fit"
        href="https://mail.google.com/mail/?view=cm&fs=1&to=info@global-sd.net"
        target="_blank"
        data-i18n="contact_gmail_general"
      >
      </a>
    </div>
  </div>

  <!-- COMMERCIALE -->
  <div class="relative card p-6 border border-black/10 rounded-xl">

    
    <h2 class="mb-4 accent" data-i18n="contact_business"></h2>

    <p class="mb-6 opacity-80" data-i18n="contact_business_text"></p>

    <div class="flex flex-col gap-3">
      <a class="btn w-fit" href="mailto:commerciale@global-sd.net">
        commerciale@global-sd.net
      </a>

      <a 
        class="text-sm opacity-70 hover:opacity-100 transition w-fit"
        href="https://mail.google.com/mail/?view=cm&fs=1&to=commerciale@global-sd.net"
        target="_blank"
        data-i18n="contact_gmail_business"
      >
      </a>
    </div>
  </div>

      </div>

      <!-- TELEFONO -->
      <div class="mt-16 text-center">
        <h2 class="mb-4" data-i18n="contact_phone_title"></h2>

        <p class="mb-6 opacity-80" data-i18n="contact_phone_text"></p>

        <a href="tel:+393510951068" class="btn">
          +39 351 095 1068
        </a>
      </div>

    </div>
  </section>

</div>

<!-- FOOTER -->

<footer class="w-full flex justify-between items-center p-6 text-sm border-t border-black/10 mt-20">
  <img src="./assets/Logo.png" alt="logo" class="tracking-wide w-[15%] lg:w-[5%]">

  <div class="flex gap-6 items-center">
    <span class="status-dot" data-i18n="p_iva"></span>
    <button onclick="setLang('it')">IT</button>
    <button onclick="setLang('en')">EN</button>
    <a href="index.html">Home</a>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
